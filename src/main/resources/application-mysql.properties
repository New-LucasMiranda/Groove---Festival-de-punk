# =====================================
# Informações da aplicação
# =====================================
spring.application.name=spring_proja3
spring.output.ansi.enabled=ALWAYS

# =====================================
# Banco de dados
# =====================================
spring.datasource.url=${MYSQL_DB_URL:jdbc:mysql://localhost:3306/A3_project}
spring.datasource.username=${MYSQL_DB_USERNAME:root}
spring.datasource.password=${MYSQL_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================================
# Email
# =====================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG
logging.level.org.eclipse.angus.mail=DEBUG
logging.level.org.eclipse.angus.mail.smtp=DEBUG

# =====================================
# Frontend
# =====================================
spring.web.resources.static-locations=classpath:/static/

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000