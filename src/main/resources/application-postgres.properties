spring.application.name=groove_aplication

spring.output.ansi.enabled=ALWAYS

app.base-url=${APP_BASE_URL:http://localhost:8080}

# PostgreSQL config
spring.datasource.url=${POSTGRES_DB_URL:jdbc:postgresql://localhost:5432/a3_project}
spring.datasource.username=${POSTGRES_DB_USER:postgres}
spring.datasource.password=${POSTGRES_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# cria/atualiza as tabelas no BD
spring.jpa.hibernate.ddl-auto=update

# exibir as instruções SQL no terminal
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG
logging.level.org.eclipse.angus.mail=DEBUG
logging.level.org.eclipse.angus.mail.smtp=DEBUG

# Static resources
spring.web.resources.static-locations=classpath:/static/

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
